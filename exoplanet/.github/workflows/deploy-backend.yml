name: Deploy Backend to EC2

on:
  push:
    branches:
      - main # Deploy when pushing to main branch
    paths:
      - "backend/**"
  workflow_dispatch: # Allow manual trigger from GitHub Actions tab

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Navigate to app directory
            cd ~/crism-backend || mkdir -p ~/crism-backend
            cd ~/crism-backend

            # Pull latest code (if using git on EC2)
            # Or we'll upload files via SCP in next step

            # Install/update dependencies
            pip3 install -r requirements.txt --upgrade
            pip3 install -r requirements_api.txt --upgrade

            # Restart the service
            sudo systemctl restart crism-api || echo "Service not found, starting manually..."

            # If not using systemd, restart manually
            pkill -f "python.*main.py" || true
            nohup python3 main.py > app.log 2>&1 &

            echo "✅ Backend deployment complete!"

      - name: Upload backend files to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "backend/app/*"
          target: "~/crism-backend"
          strip_components: 2 # Remove 'backend/app/' prefix

      - name: Verify deployment
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Wait for server to start
            sleep 5

            # Check if server is running
            curl -f http://localhost:8000/health || echo "⚠️ Health check failed"

            echo "🚀 Backend is running at http://${{ secrets.EC2_HOST }}:8000"
